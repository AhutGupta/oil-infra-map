name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # 1. ETL + tiling (Python + tippecanoe)
  # --------------------------------------------------------------------------
  process-and-tile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install tippecanoe
        run: |
          sudo apt-get update -y
          sudo apt-get install -y tippecanoe

      # Only run ETL + tiling when raw source data is present.
      # In a real project, data would be checked in or fetched here.
      - name: Run ETL & tile (if source data present)
        run: |
          if [ -f data/raw/pipelines.geojson ] || [ -f data/raw/facilities.csv ]; then
            make clean
            make tile
          else
            echo "No source data found — skipping ETL & tiling."
            mkdir -p data/tiles
          fi

      - name: Upload tile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmtiles
          path: data/tiles/
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # 2. Frontend build (Vite + React)
  # --------------------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: process-and-tile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Download tile artifacts (if any)
        uses: actions/download-artifact@v4
        with:
          name: pmtiles
          path: frontend/public/tiles
        continue-on-error: true   # tiles may not exist on a fresh branch

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  # --------------------------------------------------------------------------
  # 3. Deploy to GitHub Pages
  # --------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-frontend
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
